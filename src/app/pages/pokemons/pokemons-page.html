<h1 class="text-3xl font-bold">Listado de POKEMONS</h1>
<h2 class="text-xl">Pagina actual: {{ currentPage() }}</h2>

<hr class="my-2" />

@if (pokemons()) {
  <pokemons-list [pokemons]="pokemons()" />
} @else {
  <!-- POKEMON LIST SKELETON... -->
  <pokemon-list-skeleton />
}



<!-- botones de anterior y siguiente -->
<div class="flex justify-between mb-3">
  <button class="bg-blue-500 text-white px-4 py-2 rounded mt-2 cursor-pointer" (click)="loadPokemons(-1)">Anterior</button>
  <button class="bg-blue-500 text-white px-4 py-2 rounded mt-2 cursor-pointer" (click)="loadPokemons(+1)">Siguiente</button>
</div>
